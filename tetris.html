<!DOCTYPE html>
<html>
  <head>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Caveat+Brush&family=Euphoria+Script&family=Grand+Hotel&family=Great+Vibes&family=Kaushan+Script&family=Oleo+Script&display=swap" rel="stylesheet">
    <title>
      Tetris Game
    </title>
    <style>
      body {
        margin: 0;
      }
      #gameScreen {
        position: absolute;
        height: 100vh;
        width: 100vw;
        background: rgba(50, 100, 255, 0.3);
      }
      #gameBox {
        position: absolute;
        background: rgba(0, 0, 0, 0.5);
        border: 1vw solid rgba(100, 0, 250, 0.3);
        margin-top: 30vh;
        margin-left: 30vw;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
      }
      #topText {
        z-index: 10;
        position: absolute;
        height: 22vh;
        width: 100vw;
        background: rgba(50, 200, 255, 0.9);
        backdrop-filter: blur(50vmin);
        border-bottom-left-radius: 5vmin;
        border-bottom-right-radius: 5vmin;
        box-shadow: 0 0 2vmin 1vmin rgba(0, 0, 0, 0.1);
      }
      #topText #scores {
        position: absolute;       
        padding: 0;
        margin: 0;
        top: 3vh;
        margin-left: 5vw;
      }
      #topText h1 {
        position: relative;
        margin-top: 1vh;
        margin-bottom: 1vh;
        margin-left: 50vw;
        transform: translateX(-50%);
        font-size: 7vmin;
        font-family: 'Times New Roman';
        letter-spacing: 1vmin;
        color: gold;
        text-shadow: 0 0 2vw gold;
      }
      #topText h3 { 
        position: relative;
        font-size: 5vmin;
        font-family: 'Oleo Script';
        font-weight: 300;
      }
      table {
        margin: 0;
        border-collapse: collapse;
        box-shadow: 0 0 4vw 0 rgba(0, 0, 0, 0.5);
      }
      .tile {
        height: 2vh;
        width: 2vh;
        border: 0.7vw solid rgba(255, 255, 255, 0.3);
      }
      .tile.filled {
        border: 0.7vw solid rgba(255, 254, 255, 0.5);
        box-shadow: inset 0 0 0.3vw rgba(0, 0, 0, 0.5);
      }
      .tile.filled[data-shape="T"] {
        background-color: rgb(20, 220, 255);
      }
      .tile.filled[data-shape="L"] {
        background-color: violet;
      }
      .tile.filled[data-shape="J"] {
        background-color: rgb(255, 10, 100);
      }
      .tile.filled[data-shape="O"] {
        background-color: yellow;
      }
      .tile.filled[data-shape="I"] {
        background-color: lightgreen;
      }
      #playButtons {
        display: flex;
        gap: 5vw;
        position: absolute;
        margin-left: 50vw;
        margin-top: 90vh;
        transform: translateX(-50%);
      }
      #playButtons button  {
        font-family: 'Caveat Brush';
        font-size: 5vmin;
        padding: 2vmin;
        background: pink;
        border: 0.3vw solid magenta;
        border-radius: 4vw;
        backdrop-filter: blur(10vw);
        box-shadow: 0 0 2vmin rgba(0, 0, 0, 0.1);
      }
      #playButtons button:active {
        background: orange;
        border: 0.3vw solid red;
        filter: brightness(120%);
      }
      #controls {
        position: absolute;
        display: flex;
        flex-direction: column;
        gap: 5vh;
        flex-direction: column;
        margin-top: 35vh;
        margin-left: 61vw;
      }
      #moveButtons {
        display: flex;
        gap: 3vw;
      }
      #moveButtons button {
        font-family: 'Grand Hotel';
        font-size: 7vmin;
        background-color: orange;
        border-radius: 2vmin;
        border: 0.5vmin solid rgba(250, 100, 0, 0.8);
      }
      #moveButtons button:active {
        background-color: rgb(250, 100, 0);
        border: 0.5vw solid rgba(255, 0, 0, 1);
      }
      #moveDownButton {
        writing-mode: vertical-lr; /*rotates text 90°*/
      }
      #flipBtn {
        font-family: 'Grand Hotel';
        font-size: 7vmin;
        letter-spacing: 1vmin;
        background-color: pink;
        border-radius: 2vmin;
        border: 0.5vmin solid rgba(250, 0, 0, 0.8);
      }
      #flipBtn:active {
        background-color: powderblue;
        border: 0.5vmin solid rgba(20, 100, 200, 0.8);
      }
    </style>
  </head>
  <body>
    <div id="gameScreen">
      <div id="topText">
        <h1>— Tetris —</h1>
        <div id="scores">
          <h3>High Score: <span id="highScore"></span>
          </h3>
          <h3>Current Score: <span id="currentScore"></span>
          </h3>
        </div>
      </div>
      <div id="gameBox">
        <table id="gameGrid"></table>
      </div>
      <div id="controls">
        <div id="moveButtons">
          <button id="moveRightBtn">▶</button>
          <button id="moveLeftBtn">◀</button>
          <button id="moveDownButton">▼</button>
        </div>
        <button id="flipBtn">⟳ Flip</button>
      </div>
      <div id="playButtons">
        <button id="startButton">START</button>
        <button id="pauseButton">PAUSE</button>
        <button id="replayButton">REPLAY</button>
      </div>
    </div>
  </body>
  <script>
    //Our JS Bro
    //get layout
    const gameBox = document.getElementById('gameBox');
    const gameGrid = document.getElementById('gameGrid');
    //get scores
    const highScore = document.getElementById('highScore');
    const currentScore = document.getElementById('currentScore');
    //get buttons 
    //game buttons
    const startButton = document.getElementById('startButton');
    const pauseButton = document.getElementById('pauseButton');
    const replayButton = document.getElementById('replayButton');
    //movement buttons
    const moveRightBtn = document.getElementById('moveRightBtn');
    const moveLeftBtn = document.getElementById('moveLeftBtn');
    const moveDownButton = document.getElementById('moveDownButton');
    const flipBtn = document.getElementById('flipBtn');
    //variables declaration
    let gameInterval;
    let gameSpeed = +750;
    let isPaused = false;
    let scores = [];
    let score;
    
    //the tetrominoes
    const tetrominoes = {
      "T" : [[1,1], [1,2], [1,3], [2,2]],
      "L" : [[1,1], [1,2], [1,3], [2,3]],
      "J" : [[2,1], [2,2], [2,3], [1,3]],
      "O" : [[1,1], [1,2], [2,1], [2,2]],
      "I" : [[1,1], [1,2], [1,3], [1,4]]
    };
    
    //display functions
    function createDisplay() {
      for (let k=1; k<=20; k++) {
        const tr = document.createElement('tr');
        tr.id = `row${k}`;
        tr.className = "row";
        for (let i=1; i<=10; i++) {
          const td = document.createElement('td');
          td.id = `tile${i}${k}`;
          td.className = "tile";
          td.dataset.row = `${k}`;
          td.dataset.column = `${i}`;
          td.dataset.isActive = "false";
          tr.appendChild(td);
        };
        gameGrid.appendChild(tr);
      };
    };
    createDisplay();
    function getTile(r, c) {
      return document.querySelector(`td[data-row="${r}"][data-column="${c}"]`);
    };
    //getTile(1,1).classList.add('filled'); //testing!! works;;;
    function fillNewTile() {
      let shapes = ["T", "L", "J", "O", "I"];
      let index = Math.floor(5*Math.random());
      let currentShape = shapes[index];
      let tile = tetrominoes[currentShape];
      let shifter = +Math.floor(7*Math.random());
      let tiles = [];
      for (let k=0; k<4; k++) {
        let tileNeeded = getTile(...tile[k]);
        let row = +tileNeeded.dataset.row;
        let column = +tileNeeded.dataset.column + shifter;
        let targetTile = getTile(row, column);
        tiles.push(targetTile);
      };
      let canFill = [...tiles].every(tile => {
        if (!tile) return false;
        if (tile.classList.contains('filled') && tile.dataset.isActive === "false") return false;
        return true;
      });
      if (canFill) {
        [...tiles].forEach(tile => {
          tile.classList.add('filled');
          tile.dataset.isActive = "true";
          tile.dataset.shape = currentShape;
        });
      } else {
        gameOver();
      };
    };
    //fillNewTile(); //;;  perfected
   function clearGrid() {
      const filledTiles = document.querySelectorAll(".tile.filled");
      filledTiles.forEach(tile => {
        tile.classList.remove('filled');
        delete tile.dataset.isActive;
        delete tile.dataset.shape;
      });
    };
    
    //PLAYER CONTROLS
    //moves right
    function moveTileRight() {
      const tiles = document.querySelectorAll(`.tile.filled[data-is-active="true"]`);
      if (!tiles) return;
      const shape = [...tiles][0].dataset.shape;
      let canMove = [...tiles].every(tile => {
        const row = +tile.dataset.row;
        const column = +tile.dataset.column;
        const nextTile = getTile(row, column+1);
        if (column >= 10) return false;
        if (!nextTile) return false;
        if (nextTile.classList.contains('filled') && nextTile.dataset.isActive === "false") return false;
        return true; 
      });
      if (canMove) {
        [...tiles].forEach(tile => {
          tile.classList.remove('filled');
          delete tile.dataset.isActive;
          delete tile.dataset.shape;
        });
        [...tiles].forEach(tile => {
          newRow = +tile.dataset.row;
          newColumn = +tile.dataset.column + 1;
          getTile(newRow, newColumn).classList.add('filled');
          getTile(newRow, newColumn).dataset.shape = shape;
          getTile(newRow, newColumn).dataset.isActive = "true";
        });
      };
    };
    //moves left
    function moveTileLeft() {
      const tiles = document.querySelectorAll(`.tile.filled[data-is-active="true"]`);
      if (!tiles) return;
      const shape = [...tiles][0].dataset.shape;
      let canMove = [...tiles].every(tile => {
        const row = +tile.dataset.row;
        const column = +tile.dataset.column;
        const nextTile = getTile(row, column-1);
        if (column <= 1) return false;
        if (!nextTile) return false;
        if (nextTile.classList.contains('filled') && nextTile.dataset.isActive === "false") return false;
        return true; 
      });
      if (canMove) {
        [...tiles].forEach(tile => {
          tile.classList.remove('filled');
          delete tile.dataset.isActive;
          delete tile.dataset.shape;
        });
        [...tiles].forEach(tile => {
          newRow = +tile.dataset.row;
          newColumn = +tile.dataset.column - 1;
          getTile(newRow, newColumn).classList.add('filled');
          getTile(newRow, newColumn).dataset.shape = shape;
          getTile(newRow, newColumn).dataset.isActive = "true";
        });
      };
    };
    //moves downs
    function moveTileDown() {
      const tiles = document.querySelectorAll(`.tile.filled[data-is-active="true"]`);
      if (!tiles) return;
      let canMove = [...tiles].every(tile => {
        const row = +tile.dataset.row;
        const column = +tile.dataset.column;
        const nextTile = getTile(row+1, column);
        if (row >= 20) return false;
        if (!nextTile) return false;
        if (nextTile.classList.contains('filled') && nextTile.dataset.isActive === "false") return false;
        return true; 
      });
      if (canMove) {
        const shape = [...tiles][0].dataset.shape;
        [...tiles].forEach(tile => {
          tile.classList.remove('filled');
          const shape = tile.dataset.shape;
          delete tile.dataset.isActive;
          delete tile.dataset.shape;
        });
        [...tiles].forEach(tile => {
          newRow = parseInt(tile.dataset.row)+1;
          newColumn = parseInt(tile.dataset.column);
          getTile(newRow, newColumn).classList.add('filled');
          getTile(newRow, newColumn).dataset.shape = shape;
          getTile(newRow, newColumn).dataset.isActive = "true";
        });
      };
    };
    //flips tetrominoes
    function flipTile() {
      //get DOM & hide
      const tiles = document.querySelectorAll(`.tile.filled[data-is-active="true"]`);
      if (!tiles) return;
      const pivot = [...tiles][1];
      const shape = pivot.dataset.shape;
      //get pivot data 
      const pRow = +pivot.dataset.row;
      const pColumn = +pivot.dataset.column;
      //normalize tiles
      let rotatedTiles = [...tiles].map(tile => {
        //get coordinates
        const row = +tile.dataset.row;
        const column = +tile.dataset.column;
        //get relative distances (normalize)
        const relativeRow = row - pRow;
        const relativeColumn = column - pColumn;
        //set new coordinates (apply rotation)
        const newRow = +relativeColumn;
        const newColumn = -relativeRow;
        //denormalize
        const newCoordX = newRow + pRow;
        const newCoordY = newColumn + pColumn;
        //return new tile
        return getTile(newCoordX, newCoordY);
      });
      //fill in back
      let safetyViolation = [...rotatedTiles].some(tile => {
        return ((tile.classList.contains('filled') && tile.dataset.isActive === "false") || !tile);
      });
      if (!safetyViolation) {
        [...tiles].forEach(tile => {
          tile.classList.remove('filled');
          delete tile.dataset.isActive;
          delete tile.dataset.shape;
        });
        [...rotatedTiles].forEach(newTile => {
          newTile.classList.add('filled');
          newTile.dataset.isActive = "true";
          newTile.dataset.shape = shape;
        });
      } else return;
    }; //this works!!! good;;;!!!!
    //assigning movement buttons
    moveRightBtn.addEventListener('click', () => {
      moveTileRight();
    });
    moveLeftBtn.addEventListener('click', () => {
      moveTileLeft();
    });
    moveDownButton.addEventListener('click', () => {
      moveTileDown();
    });
    flipBtn.addEventListener('click', () => {
      flipTile();
    });
    
    //THE ACTUAL GAME
    function drop() {
      const tiles = document.querySelectorAll(`.tile.filled[data-is-active="true"]`);
      let canMove = [...tiles].every(tile => {
        const row = +tile.dataset.row;
        const column = +tile.dataset.column;
        const nextTile = getTile(row+1, column);
        if (row >= 20) return false;
        if (!nextTile) return false;
        if (nextTile.classList.contains('filled') && nextTile.dataset.isActive === "false") return false;
        return true; 
      });
      if (canMove) {
          moveTileDown();
      } else {
        [...tiles].forEach(tile => {
          tile.dataset.isActive = "false";
        });
        clearRow();
        fillNewTile();
      };
    };
    function clearRow() {
      const allRows = document.querySelectorAll('.row');
      for (let k=19; k>=0; k--) {
        let currentRow = [...allRows][k];
        const tiles = currentRow.querySelectorAll('.tile');
        let isRowFilled = [...tiles].every(tile => tile.classList.contains('filled'));
        if (isRowFilled) {
          [...tiles].forEach(tile => {
            tile.classList.remove('filled');
            delete tile.dataset.shape;
          });
          score = parseInt(currentScore.textContent) || 0;
          score += 100;
          currentScore.textContent = score;
          if (gameSpeed > 100) {
            clearInterval(gameInterval);
            gameSpeed--;
            gameInterval = setInterval(drop, gameSpeed);
          } else {
            clearInterval(gameInterval);
            gameSpeed = 100;
            gameInterval = setInterval(drop, gameSpeed);
          };
          for (let i=k; i>=0; i--) {
            const rowTiles = document.querySelectorAll(`.tile.filled[data-row="${i}"]`);
            rowTiles.forEach(tile => {
              const row = +tile.dataset.row;
              const column = +tile.dataset.column;
              const shape = tile.dataset.shape;
              if (tile.dataset.isActive === "false") {
                tile.classList.remove('filled');
                delete tile.dataset.shape;
                const target = getTile(row+1, column);
                if (target) {
                  target.classList.add('filled');
                  target.dataset.shape = shape;
                };
              };
            });
          };
          k++;
        };
      };
    };
    
    //game functions
    function gameOver() {
      clearInterval(gameInterval);
      scores.push(score);
      highScore.textContent = Math.max(...scores) || 0;
      alert(`Game Over! Your score: ${score}.`);
    };
    function startGame() {
      fillNewTile();
      gameInterval = setInterval(drop, gameSpeed);
    };
    function handlePause() {
      if (!isPaused) {
        clearInterval(gameInterval);
        isPaused = true;
        pauseButton.textContent = "CONTINUE";
        moveRightBtn.disabled = true;
        moveLeftBtn.disabled = true;
        moveDownButton.disabled = true;
        flipBtn.disabled = true;
      } else {
        gameInterval = setInterval(drop, gameSpeed);
        isPaused = false;
        pauseButton.textContent = "PAUSE";
        moveRightBtn.disabled = false;
        moveLeftBtn.disabled = false;
        moveDownButton.disabled = false;
        flipBtn.disabled = false;
      };
    };
    
    //assigning game buttons 
    startButton.addEventListener('click', () => {
      if (!gameInterval) {
        startGame();
      } else return; //necessary to prevent overlooping setInterval in case player accidently taps when game is already active
    });
    pauseButton.addEventListener('click', () => {
      handlePause();
    });
    replayButton.addEventListener('click', () => {
      if (!isPaused) {
        isPaused = true;
        pauseButton.textContent = "CONTINUE";
        moveRightBtn.disabled = true;
        moveLeftBtn.disabled = true;
        moveDownButton.disabled = true;
        flipBtn.disabled = true;
        clearInterval(gameInterval);
        currentScore.textContent = +0;
        clearGrid();
        startGame();
      } else {
        isPaused = false;
        pauseButton.textContent = "PAUSE";
        moveRightBtn.disabled = false;
        moveLeftBtn.disabled = false;
        moveDownButton.disabled = false;
        flipBtn.disabled = false;
        clearInterval(gameInterval);
        currentScore.textContent = +0;
        clearGrid();
        startGame();
      };
    });
  </script>
</html>
